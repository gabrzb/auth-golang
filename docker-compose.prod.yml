# Production override for docker-compose.yml.
# Run with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up --build
# Overrides api COOKIE_SECURE and CORS_ALLOWED_ORIGINS for production, and
# publishes web through WEB_PORT.
services:
  api:
    environment:
      COOKIE_SECURE: "true"
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?Set CORS_ALLOWED_ORIGINS to your production origin, for example https://yourdomain.com}

  web:
    ports:
      - "${WEB_PORT:-80}:80"
